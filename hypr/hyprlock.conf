# 5. НИЖНЯЯ КАПСУЛА: ПОЛЕ ВВОДА ПАРОЛЯ (Твой стиль)
input-field {
    monitor =
    size = 330, 63
    outline_thickness = 2
    rounding = 40       
    
    outer_color = rgba(255, 255, 255, 0.6)
    inner_color = rgba(36, 39, 58, 0.25)
    font_color = rgb(255, 255, 255)
    
    blur_background = true
    blur_passes = 3
    blur_size = 7

    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    fade_on_empty = false
    
    placeholder_text = <span foreground="##8087a2" font_family="JetBrains Mono">Password...</span>
    hide_input = false
    
    position = 0, -40
    halign = center
    valign = center
}
