# 1. ОБЩИЙ ФОН ЭКРАНА
background {
    monitor =
    path = screenshot
    blur_passes = 0    
}

# 2. ВЕРХНЯЯ КАПСУЛА: ПОДЛОЖКА ЧАСОВ (Твой стиль)
shape {
    monitor =
    size = 550, 250
    rounding = 90      

    color = rgba(36, 39, 58, 0.25)
    border_size = 2
    border_color = rgba(255, 255, 255, 0.6)

    position = 0, 170
    halign = center
    valign = center
}

# 3. ВОЗВРАЩАЕМ ДЕВОЧЕК (Отображение готового PNG)
image {
    monitor =
    path = /tmp/hyprlock_clock.png
    
    size = 500
    rounding = 0       
    border_size = 0
    
    # Говорим hyprlock проверять файл каждую секунду. 
    # Он не будет мерцать, пока скрипт не перезапишет картинку!
    reload_time = 1

    position = 0, 170
    halign = center
    valign = center
    zindex = 1         
}

# 4. СИСТЕМНЫЙ ТАЙМЕР (Запуск скрипта ровно в 00 секунд)
label {
    monitor =
    # Каждую секунду проверяем системное время. 
    # Как только секунды стали "00", скрипт генерирует новую минуту.
    text = cmd[update:1000] [ "$(date +%S)" = "00" ] && /home/nirx/.config/hypr/clock_girls/make_clock.sh || echo ""
    
    color = rgba(0, 0, 0, 0.0) # Делаем этот текст невидимым
    font_size = 1
    position = 0, 0
    halign = left
    valign = top
}

